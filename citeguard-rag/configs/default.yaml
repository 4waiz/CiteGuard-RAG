# CiteGuard-RAG default configuration.
# Thresholds were chosen as reasonable starting points and SHOULD be tuned
# on held-out data before reporting any numbers in a paper.

run_name: "default"

models:
  sbert: "sentence-transformers/all-MiniLM-L6-v2"
  nli: "cross-encoder/nli-deberta-v3-base"
  device: "auto"  # "cpu", "cuda", or "auto"

retrieval:
  top_k: 5
  use_bm25: true
  use_dense: true
  # When both are enabled, scores are min-max normalized then averaged.

evaluators:
  semantic:
    enabled: true
  nli:
    enabled: true
    max_evidence_chars: 1500
  bm25:
    enabled: true
  llm_judge:
    enabled: false  # OFF by default. Never enable for paper numbers without disclosure.
    model: null

thresholds:
  # Entailment probability above which cited evidence counts as supporting.
  entail_support: 0.55
  # Contradiction probability above which we mark CONTRADICTED.
  contradict: 0.55
  # Semantic cosine above which a retrieved-but-uncited chunk is treated as related.
  semantic_related: 0.55
  # Semantic cosine above which a retrieved-but-uncited chunk is treated as supporting.
  semantic_strong: 0.70
  # If best semantic score is below this, claim is unsupported.
  unsupported_floor: 0.30

claim_splitter:
  min_chars: 5
  strip_citations_for_embedding: true

citation_parser:
  patterns:
    # Numeric and named bracketed citations. Multiple inside a bracket allowed.
    - "\\[([^\\]]+)\\]"
  numeric_prefix: "doc"  # interpret [1] as doc1 when numeric

output:
  tables_dir: "outputs/tables"
  figures_dir: "outputs/figures"
  cards_dir: "outputs/evidence_cards"
  reports_dir: "outputs/reports"
